<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus AI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">
        <img
          src="static/Blue Black Modern Cloud Brain Logo Design.png"
          alt="Logo"
        />
      </div>
      <ul>
        <li>Home</li>
        <li>Features</li>
        <li>Pricing</li>
        <li>FAQ</li>
        <li>Contact</li>
      </ul>
      <!-- Button From Uiverse.io by adamgiebl -->
      <button class="cssbuttons-io-button">
        Focus Now
        <div class="icon">
          <svg
            height="24"
            width="24"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M0 0h24v24H0z" fill="none"></path>
            <path
              d="M16.172 11l-5.364-5.364 1.414-1.414L20 12l-7.778 7.778-1.414-1.414L16.172 13H4v-2z"
              fill="currentColor"
            ></path>
          </svg>
        </div>
      </button>
    </nav>
    <section class="hero-1">
      <div class="hero-content">
        <h1 class="focus-heading">
          Focus less on tasks, <span>focus more on results.</span>
        </h1>
        <h2 class="hero-subtitle">
          Built to turn busywork into clarity, Focus AI helps you move from
          planning to performance with smarter priorities and faster outcomes.
        </h2>
      </div>
    </section>
    <section class="section-1">
      <div class="first-feature">
        <h2 class="features-heading">Stay in the zone 24/7.</h2>
        <img class="everything" src="static/everything.png" alt="" />
      </div>
    </section>
  </body>
</html>
